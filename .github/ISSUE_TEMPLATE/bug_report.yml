name: Bug Report
description: Report a bug in sentrik
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: sentrik version
      description: "Run `sentrik --version`"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: "e.g. Windows 11, macOS 14, Ubuntu 22.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or config
      description: Paste any error messages, config snippets, or scan output.
      render: shell
